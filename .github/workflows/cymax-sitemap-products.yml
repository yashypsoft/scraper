name: Cymax Scraper with FlareSolverr (Chunked)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Base site URL"
        required: true
        default: "https://www.cymax.com"
      total_sitemaps:
        description: "Total sitemaps to process (0 = auto)"
        default: "13"
      urls_per_sitemap:
        description: "Max URLs to take from one sitemap (0 = all)"
        default: "1000"
      urls_per_job:
        description: "Max URLs to process per job (splits large sitemaps)"
        default: "50000"
      total_chunks:
        description: "Number of parallel chunks to split into (0 = auto by urls_per_job)"
        default: "0"
      max_workers:
        description: "Parallel requests per job"
        default: "6"
      request_delay:
        description: "Delay between requests (seconds)"
        default: "0"
      sample_size:
        description: "URLs to sample for product detection"
        default: "5"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate_matrix.outputs.matrix }}
      site_name: ${{ steps.get_site_name.outputs.site_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Get site name from URL
        id: get_site_name
        run: |
          URL="${{ github.event.inputs.url }}"
          SITE_NAME=$(echo "$URL" | sed -E 's|https?://||;s|www\.||;s|\.[a-zA-Z]+(/.*)?$||;s|/.*||')
          echo "site_name=$SITE_NAME" >> $GITHUB_OUTPUT
          echo "Site name extracted: $SITE_NAME"

      - name: Start FlareSolverr pool
        id: flaresolverr_pool
        run: |
          INSTANCES="${{ github.event.inputs.max_workers }}"
          PLAN_MAX_INSTANCES=4
          if ! [[ "$INSTANCES" =~ ^[0-9]+$ ]] || [ "$INSTANCES" -lt 1 ]; then
            INSTANCES=1
          fi
          if [ "$INSTANCES" -gt "$PLAN_MAX_INSTANCES" ]; then
            echo "Capping plan FlareSolverr instances to $PLAN_MAX_INSTANCES (requested: $INSTANCES)"
            INSTANCES="$PLAN_MAX_INSTANCES"
          fi

          BASE_PORT=8191
          URLS=""
          HEALTHY_INSTANCES=0

          echo "Starting $INSTANCES FlareSolverr instances..."
          for ((i=0; i<INSTANCES; i++)); do
            PORT=$((BASE_PORT + i))
            NAME="flaresolverr_${PORT}"
            echo "Starting $NAME on localhost:$PORT"
            if ! docker run -d --name "$NAME" --cap-add=SYS_ADMIN -p "${PORT}:8191" ghcr.io/flaresolverr/flaresolverr:latest >/dev/null; then
              echo "⚠ Failed to launch $NAME, skipping"
            fi
          done

          echo "Waiting for all FlareSolverr instances..."
          for ((i=0; i<INSTANCES; i++)); do
            PORT=$((BASE_PORT + i))
            NAME="flaresolverr_${PORT}"
            URL="http://localhost:${PORT}/v1"
            READY=0

            for attempt in {1..45}; do
              if curl -s -f -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d '{"cmd":"sessions.list"}' > /dev/null 2>&1; then
                READY=1
                echo "✓ $NAME ready"
                break
              fi
              echo "Attempt $attempt: $NAME not ready yet..."
              sleep 2
            done

            if [ "$READY" -ne 1 ]; then
              echo "⚠ $NAME failed to start, skipping"
              docker logs "$NAME" || true
              docker rm -f "$NAME" >/dev/null 2>&1 || true
              continue
            fi

            if [ -z "$URLS" ]; then
              URLS="$URL"
            else
              URLS="$URLS,$URL"
            fi
            HEALTHY_INSTANCES=$((HEALTHY_INSTANCES + 1))
          done

          if [ "$HEALTHY_INSTANCES" -lt 1 ]; then
            echo "❌ No FlareSolverr instances are healthy"
            exit 1
          fi

          FIRST_URL="${URLS%%,*}"
          echo "instances=$HEALTHY_INSTANCES" >> $GITHUB_OUTPUT
          echo "urls=$URLS" >> $GITHUB_OUTPUT
          echo "first_url=$FIRST_URL" >> $GITHUB_OUTPUT
          echo "FlareSolverr URL list: $URLS"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Collect all product URLs
        id: collect_urls
        env:
          COLLECT_URLS_ONLY: "1"
          MASTER_URLS_FILE: cymax_all_urls.txt
          CURR_URL: ${{ github.event.inputs.url }}
        run: |
          python cymax/cymax.py
          if [ ! -f cymax_all_urls.txt ]; then
            echo "URL file not generated"
            exit 1
          fi
          TOTAL_URLS=$(wc -l < cymax_all_urls.txt)
          echo "total_urls=$TOTAL_URLS" >> $GITHUB_OUTPUT
          echo "Total URLs collected: $TOTAL_URLS"

      - name: Generate dynamic chunk matrix from URL file
        id: generate_matrix
        run: |
          URLS_PER_JOB="${{ github.event.inputs.urls_per_job }}"
          TOTAL_CHUNKS="${{ github.event.inputs.total_chunks }}"
          TOTAL_URLS="${{ steps.collect_urls.outputs.total_urls }}"

          if [ "$TOTAL_URLS" -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If user specifies total_chunks > 0, calculate URLs per job dynamically
          if [[ "$TOTAL_CHUNKS" =~ ^[0-9]+$ ]] && [ "$TOTAL_CHUNKS" -gt 0 ]; then
            CHUNK_COUNT="$TOTAL_CHUNKS"
            URLS_PER_JOB=$(( (TOTAL_URLS + CHUNK_COUNT - 1) / CHUNK_COUNT ))
          else
            if ! [[ "$URLS_PER_JOB" =~ ^[0-9]+$ ]] || [ "$URLS_PER_JOB" -lt 1 ]; then
              URLS_PER_JOB=50000
            fi
            CHUNK_COUNT=$(( (TOTAL_URLS + URLS_PER_JOB - 1) / URLS_PER_JOB ))
          fi

          echo "Total URLs: $TOTAL_URLS"
          echo "Chunk count: $CHUNK_COUNT"
          echo "URLs per job: $URLS_PER_JOB"

          MATRIX_JSON=$(jq -cn \
            --arg base_url "${{ github.event.inputs.url }}" \
            --arg urls_file "cymax_all_urls.txt" \
            --argjson chunk_count "$CHUNK_COUNT" \
            --argjson urls_per_job "$URLS_PER_JOB" \
            '
            [ range(0; $chunk_count) |
              {
                chunk_id: .,
                offset: (. * $urls_per_job),
                limit: $urls_per_job,
                base_url: $base_url,
                urls_file: $urls_file
              }
            ]
            ')

          echo "matrix={\"include\":$MATRIX_JSON}" >> "$GITHUB_OUTPUT"

      - name: Stop FlareSolverr pool
        if: always()
        run: |
          docker ps -a --format '{{.Names}}' | grep '^flaresolverr_' | xargs -r docker rm -f

  scrape:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix).include }}
    steps:
      - uses: actions/checkout@v4

      - name: Start FlareSolverr pool
        id: flaresolverr_pool
        run: |
          INSTANCES="${{ github.event.inputs.max_workers }}"
          if ! [[ "$INSTANCES" =~ ^[0-9]+$ ]] || [ "$INSTANCES" -lt 1 ]; then
            INSTANCES=1
          fi

          BASE_PORT=8191
          URLS=""
          HEALTHY_INSTANCES=0

          echo "Starting $INSTANCES FlareSolverr instances..."
          for ((i=0; i<INSTANCES; i++)); do
            PORT=$((BASE_PORT + i))
            NAME="flaresolverr_${PORT}"
            echo "Starting $NAME on localhost:$PORT"
            if ! docker run -d --name "$NAME" --cap-add=SYS_ADMIN -p "${PORT}:8191" ghcr.io/flaresolverr/flaresolverr:latest >/dev/null; then
              echo "⚠ Failed to launch $NAME, skipping"
            fi
          done

          echo "Waiting for all FlareSolverr instances..."
          for ((i=0; i<INSTANCES; i++)); do
            PORT=$((BASE_PORT + i))
            NAME="flaresolverr_${PORT}"
            URL="http://localhost:${PORT}/v1"
            READY=0

            for attempt in {1..45}; do
              if curl -s -f -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d '{"cmd":"sessions.list"}' > /dev/null 2>&1; then
                READY=1
                echo "✓ $NAME ready"
                break
              fi
              sleep 2
            done

            if [ "$READY" -ne 1 ]; then
              echo "⚠ $NAME failed to start, skipping"
              docker logs "$NAME" || true
              docker rm -f "$NAME" >/dev/null 2>&1 || true
              continue
            fi

            if [ -z "$URLS" ]; then
              URLS="$URL"
            else
              URLS="$URLS,$URL"
            fi
            HEALTHY_INSTANCES=$((HEALTHY_INSTANCES + 1))
          done

          if [ "$HEALTHY_INSTANCES" -lt 1 ]; then
            echo "❌ No FlareSolverr instances are healthy"
            exit 1
          fi

          FIRST_URL="${URLS%%,*}"
          echo "instances=$HEALTHY_INSTANCES" >> $GITHUB_OUTPUT
          echo "urls=$URLS" >> $GITHUB_OUTPUT
          echo "first_url=$FIRST_URL" >> $GITHUB_OUTPUT
          echo "FlareSolverr URL list: $URLS"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper chunk
        id: scrape_run
        continue-on-error: true
        env:
          PRODUCT_URLS_FILE: ${{ matrix.urls_file }}
          URL_OFFSET: ${{ matrix.offset }}
          URL_LIMIT: ${{ matrix.limit }}
          CHUNK_ID: ${{ matrix.chunk_id }}
          CURR_URL: ${{ matrix.base_url }}
          MAX_WORKERS: ${{ github.event.inputs.max_workers }}
          REQUEST_DELAY: ${{ github.event.inputs.request_delay }}
          SAMPLE_SIZE: ${{ github.event.inputs.sample_size }}
          FLARESOLVERR_INSTANCES: ${{ steps.flaresolverr_pool.outputs.instances }}
          FLARESOLVERR_URL: ${{ steps.flaresolverr_pool.outputs.first_url }}
          FLARESOLVERR_URLS: ${{ steps.flaresolverr_pool.outputs.urls }}
        run: |
          echo "Processing chunk $CHUNK_ID"
          echo "Product URLs file: $PRODUCT_URLS_FILE"
          echo "Offset: $URL_OFFSET, Limit: $URL_LIMIT"
          echo "FLARESOLVERR_INSTANCES: $FLARESOLVERR_INSTANCES"
          echo "FLARESOLVERR_URLS: $FLARESOLVERR_URLS"
          python cymax/cymax.py || echo "Scraper failed with exit code $?"

      - name: Stop FlareSolverr pool
        if: always()
        run: |
          docker ps -a --format '{{.Names}}' | grep '^flaresolverr_' | xargs -r docker rm -f

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chunk_${{ matrix.chunk_id }}
          path: cymax_products_*.csv
          if-no-files-found: warn

  merge:
    needs: [plan, scrape]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Download all chunks
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: chunks
          pattern: chunk_*
          merge-multiple: true

      - name: Check for CSV files
        id: check_files
        run: |
          CSV_FILES=$(find chunks -name "cymax_products_*.csv" 2>/dev/null || echo "")
          if [ -z "$CSV_FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "ERROR: No CSV files found in artifacts!"
            exit 0
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "Found CSV files:"
            echo "$CSV_FILES"
            CHUNK_COUNT=$(echo "$CSV_FILES" | wc -l)
            echo "chunk_count=$CHUNK_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Merge CSV chunks
        id: merge_csv
        if: steps.check_files.outputs.has_files == 'true'
        run: |
          echo "Merging CSV chunks..."
          CSV_FILES=$(find chunks -name "cymax_products_*.csv")
          FIRST_FILE=$(echo "$CSV_FILES" | head -n 1)
          echo "Using header from: $FIRST_FILE"
          head -n 1 "$FIRST_FILE" > cymax_products_full.csv
          TOTAL_ROWS=0
          FILE_COUNT=0
          for f in $CSV_FILES; do
            if [ -f "$f" ]; then
              FILE_COUNT=$((FILE_COUNT + 1))
              ROWS=$(tail -n +2 "$f" 2>/dev/null | wc -l || echo "0")
              TOTAL_ROWS=$((TOTAL_ROWS + ROWS))
              echo "Processing $f: $ROWS rows"
              tail -n +2 "$f" 2>/dev/null | sed '/^$/d' >> cymax_products_full.csv
            fi
          done
          FINAL_ROWS=$(tail -n +2 cymax_products_full.csv 2>/dev/null | wc -l || echo "0")
          echo "Merged $FINAL_ROWS rows from $FILE_COUNT files"
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "final_rows=$FINAL_ROWS" >> $GITHUB_OUTPUT

      - name: Build output filename
        id: meta
        run: |
          SITE_NAME="${{ needs.plan.outputs.site_name }}"
          if [ -z "$SITE_NAME" ]; then
            SITE_NAME="cymax"
          fi
          DATE=$(date +%F_%H%M%S)
          echo "name=${SITE_NAME}_${DATE}.csv" >> $GITHUB_OUTPUT
          echo "Generated filename: ${SITE_NAME}_${DATE}.csv"

      - name: Upload to FTP (if merge succeeded)
        if: steps.merge_csv.outputs.final_rows > 0
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_BASE_DIR: ${{ secrets.FTP_PATH }}
          FILE: ${{ steps.meta.outputs.name }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "FTP credentials not configured. Skipping FTP upload."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          cd $FTP_BASE_DIR
          put cymax_products_full.csv -o $FILE
          bye
          EOF
          echo "Upload completed: $FILE"

      - name: Create summary report
        run: |
          SITE_NAME="${{ needs.plan.outputs.site_name }}"
          SITE_URL="${{ github.event.inputs.url }}"
          OUTPUT_FILE="${{ steps.meta.outputs.name }}"
          FILE_COUNT="${{ steps.merge_csv.outputs.file_count || '0' }}"
          TOTAL_ROWS="${{ steps.merge_csv.outputs.final_rows || '0' }}"
          SUCCESSFUL_CHUNKS="${{ steps.check_files.outputs.chunk_count || '0' }}"
          PLANNED_JOBS="${{ fromJson(needs.plan.outputs.matrix).include && fromJson(needs.plan.outputs.matrix).include.length || '0' }}"
          
          echo "========================================="
          echo "          SCRAPING SUMMARY"
          echo "========================================="
          echo "Site Name:       $SITE_NAME"
          echo "Site URL:        $SITE_URL"
          echo "Output File:     $OUTPUT_FILE"
          echo ""
          echo "Job Status:"
          echo "  Planned Jobs:  $PLANNED_JOBS"
          echo "  Successful:    $SUCCESSFUL_CHUNKS"
          echo "  Failed:        $((PLANNED_JOBS - SUCCESSFUL_CHUNKS))"
          echo ""
          echo "Results:"
          echo "  Total Files:    $FILE_COUNT chunks"
          echo "  Total Products: $TOTAL_ROWS rows"
          echo ""
          echo "Configuration:"
          echo "  Max Workers:   ${{ github.event.inputs.max_workers }}"
          echo "  Request Delay: ${{ github.event.inputs.request_delay }}s"
          echo "  URLs/Sitemap:  ${{ github.event.inputs.urls_per_sitemap }}"
          echo "  URLs/Job:      ${{ github.event.inputs.urls_per_job }}"
          echo "  Total Chunks:  ${{ github.event.inputs.total_chunks }}"
          echo "  Total Sitemaps: ${{ github.event.inputs.total_sitemaps }}"
          echo "  FlareSolverr:  Enabled"
          echo "========================================="
          
          if [ -f "cymax_products_full.csv" ]; then
            echo ""
            echo "First 3 rows of data:"
            echo "======================"
            head -n 4 cymax_products_full.csv
          else
            echo ""
            echo "No data was successfully scraped!"
          fi

      - name: Archive final results
        if: steps.merge_csv.outputs.final_rows > 0
        uses: actions/upload-artifact@v4
        with:
          name: final_results
          path: cymax_products_full.csv
          retention-days: 7