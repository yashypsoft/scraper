name: Google Shopping Scraper (MySQL Flow)

on:
  workflow_dispatch:
    inputs:
      input_filename:
        description: "Input CSV filename (optional, ignored)"
        required: false
        default: ""
        type: string
      start_sales:
        description: "Start sales boundary for this account partition"
        required: false
        default: ""
        type: string
      start_id:
        description: "Start product ID boundary for this account partition"
        required: false
        default: ""
        type: string
      end_sales:
        description: "End sales boundary for this account partition"
        required: false
        default: ""
        type: string
      end_id:
        description: "End product ID boundary for this account partition"
        required: false
        default: ""
        type: string
      total_chunks:
        description: "Parallel workers to run in this account"
        required: true
        default: "20"
        type: string
      products_per_hour:
        description: "Expected products per worker per hour"
        required: true
        default: "35"
        type: string
      max_runtime_hours:
        description: "Maximum hours per worker"
        required: true
        default: "6"
        type: string
      claim_limit:
        description: "Products claimed per worker (blank = products_per_hour * max_runtime_hours)"
        required: false
        default: ""
        type: string
      run_depth:
        description: "Current recursive run depth"
        required: true
        default: "1"
        type: string
      max_depth:
        description: "Maximum recursive run depth"
        required: true
        default: "50"
        type: string
      reset_errors:
        description: "Reset previous errors/invalid URLs to pending before starting"
        required: true
        default: "false"
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pymysql cryptography

      - name: Reset errors if requested
        if: ${{ (github.event.inputs.reset_errors == 'true') && (github.event.inputs.run_depth == '1' || github.event.inputs.run_depth == '') }}
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
        run: |
          python gshopping/gscraper_pg.py --reset-errors

      - id: matrix
        run: |
          TOTAL_CHUNKS=${{ github.event.inputs.total_chunks || 20 }}

          MATRIX="["
          for ((i=1;i<=TOTAL_CHUNKS;i++)); do
            MATRIX+="{\"worker_index\":$i},"
          done
          MATRIX="${MATRIX%,}]"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  scrape:
    needs: plan
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget gnupg ca-certificates unzip xvfb libxss1 libappindicator3-1 \
            libindicator7 libnss3 libnspr4 libatk-bridge2.0-0 libgtk-3-0 \
            libx11-xcb1 libxcomposite1 libxrandr2 libgbm1 libasound2 \
            fonts-liberation libu2f-udev

      - name: Download fixed Google Chrome 146
        run: |
          CHROME_VERSION=146.0.7680.71
          DOWNLOAD_DIR=/tmp/chrome146
          ZIP_PATH=/tmp/chrome-${CHROME_VERSION}.zip
          mkdir -p "$DOWNLOAD_DIR"
          wget -qO "$ZIP_PATH" "https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${CHROME_VERSION}/linux64/chrome-linux64.zip"
          unzip -q "$ZIP_PATH" -d "$DOWNLOAD_DIR"
          sudo rm -rf "/opt/google-chrome-${CHROME_VERSION}"
          sudo mv "${DOWNLOAD_DIR}/chrome-linux64" "/opt/google-chrome-${CHROME_VERSION}"
          sudo ln -sf "/opt/google-chrome-${CHROME_VERSION}/chrome" /usr/bin/google-chrome-stable
          sudo chmod +x "/opt/google-chrome-${CHROME_VERSION}/chrome"
          echo "CHROME_BIN=/opt/google-chrome-${CHROME_VERSION}/chrome" >> "$GITHUB_ENV"

      - name: Download matching ChromeDriver 146
        run: |
          CHROMEDRIVER_VERSION=146.0.7680.72
          DRIVER_DIR=/opt/chromedriver-${CHROMEDRIVER_VERSION}
          ZIP_PATH=/tmp/chromedriver-${CHROMEDRIVER_VERSION}.zip
          wget -qO "$ZIP_PATH" "https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${CHROMEDRIVER_VERSION}/linux64/chromedriver-linux64.zip"
          unzip -q "$ZIP_PATH" -d /tmp
          sudo rm -rf "$DRIVER_DIR"
          sudo mkdir -p "$DRIVER_DIR"
          sudo mv /tmp/chromedriver-linux64/chromedriver "$DRIVER_DIR/"
          sudo chmod +x "$DRIVER_DIR/chromedriver"
          echo "CHROMEDRIVER_BIN=${DRIVER_DIR}/chromedriver" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            selenium==4.18.1 \
            undetected-chromedriver==3.5.5 \
            webdriver-manager \
            pandas==2.1.4 \
            beautifulsoup4==4.12.2 \
            requests==2.31.0 \
            lxml==4.9.3 \
            fake-useragent==1.4.0 \
            python-dateutil==2.8.2 \
            pymysql==1.1.0 \
            cryptography \
            SQLAlchemy==2.0.25 \
            python-dotenv

      - name: Run scraper worker directly to MySQL
        env:
          DISPLAY: :99
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
          PRODUCTS_PER_HOUR: ${{ github.event.inputs.products_per_hour || '35' }}
          MAX_RUNTIME_HOURS: ${{ github.event.inputs.max_runtime_hours || '6' }}
          CLAIM_LIMIT: ${{ github.event.inputs.claim_limit }}
          SCRAPER_WORKER_ID: gshopping-mysql-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.worker_index }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3

          TOTAL_WORKERS="${{ github.event.inputs.total_chunks || 20 }}"

          python -u gshopping/gscraper_pg.py \
            --chunk-id ${{ matrix.worker_index }} \
            --total-chunks "$TOTAL_WORKERS" \
            --products-per-hour "$PRODUCTS_PER_HOUR" \
            --max-runtime-hours "$MAX_RUNTIME_HOURS" \
            --worker-id "$SCRAPER_WORKER_ID" \
            --start-sales "${{ github.event.inputs.start_sales }}" \
            --start-id "${{ github.event.inputs.start_id }}" \
            --end-sales "${{ github.event.inputs.end_sales }}" \
            --end-id "${{ github.event.inputs.end_id }}"

  dispatch_next_round:
    needs: scrape
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install database and reporting dependencies
        run: |
          pip install pymysql cryptography pandas python-dotenv

      - name: Check if product fetching is finished in DB
        id: check_rem
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
        run: |
          python - <<'PY'
          import os
          import pymysql
          
          try:
              mysql_host = os.environ.get("MYSQL_HOST")
              mysql_port = os.environ.get("MYSQL_PORT", "3306")
              try:
                  mysql_port = int(mysql_port)
              except ValueError:
                  mysql_port = 3306
              mysql_user = os.environ.get("MYSQL_USER")
              mysql_pass = os.environ.get("MYSQL_PASS")
              mysql_db = os.environ.get("MYSQL_DB")
              
              conn = pymysql.connect(
                  host=mysql_host,
                  port=mysql_port,
                  user=mysql_user,
                  password=mysql_pass,
                  database=mysql_db
              )
              cursor = conn.cursor()
              cursor.execute("""
                  SELECT
                      COALESCE(SUM(CASE WHEN scraping_status = 'pending' THEN 1 ELSE 0 END), 0) AS pending_count,
                      COALESCE(SUM(CASE WHEN scraping_status = 'claimed' THEN 1 ELSE 0 END), 0) AS claimed_count
                  FROM osb_products
                  WHERE scraping_status IN ('pending', 'claimed')
                    AND status = 1
              """)
              pending_count, claimed_count = cursor.fetchone()
              cursor.close()
              conn.close()
              
              print(f"Pending products: {pending_count}")
              print(f"Claimed/in-progress products: {claimed_count}")
              
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"pending_count={pending_count}\n")
                  f.write(f"claimed_count={claimed_count}\n")
          except Exception as e:
              print(f"Error checking DB: {e}")
              import sys
              sys.exit(1)
          PY

      - name: Trigger next round workflow
        if: ${{ fromJSON(steps.check_rem.outputs.pending_count || '0') > 0 && fromJSON(github.event.inputs.run_depth || '1') < fromJSON(github.event.inputs.max_depth || '50') }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runDepth = Number('${{ github.event.inputs.run_depth || '1' }}');
            const nextDepth = runDepth + 1;
            const totalChunks = '${{ github.event.inputs.total_chunks || '20' }}';
            const maxDepth = '${{ github.event.inputs.max_depth || '50' }}';
            const productsPerHour = '${{ github.event.inputs.products_per_hour || '35' }}';
            const maxRuntimeHours = '${{ github.event.inputs.max_runtime_hours || '6' }}';
            const claimLimit = '${{ github.event.inputs.claim_limit }}';
            const startSales = '${{ github.event.inputs.start_sales }}';
            const startId = '${{ github.event.inputs.start_id }}';
            const endSales = '${{ github.event.inputs.end_sales }}';
            const endId = '${{ github.event.inputs.end_id }}';

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'gshopping_mysql.yml',
              ref: 'refs/heads/main',
              inputs: {
                total_chunks: totalChunks,
                products_per_hour: productsPerHour,
                max_runtime_hours: maxRuntimeHours,
                claim_limit: claimLimit,
                run_depth: String(nextDepth),
                max_depth: maxDepth,
                reset_errors: 'false',
                start_sales: startSales,
                start_id: startId,
                end_sales: endSales,
                end_id: endId
              },
            });

            core.info(`Triggered next round depth=${nextDepth}`);

      - name: Generate and upload reports if no products remaining
        if: ${{ fromJSON(steps.check_rem.outputs.pending_count || '0') == 0 && fromJSON(steps.check_rem.outputs.claimed_count || '0') == 0 }}
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          ORACLE_SFTP_UPLOAD: ${{ secrets.ORACLE_SFTP_UPLOAD }}
          ORACLE_SFTP_HOST: ${{ secrets.ORACLE_SFTP_HOST }}
          ORACLE_SFTP_USER: ${{ secrets.ORACLE_SFTP_USER }}
          ORACLE_SFTP_PRIVATE_KEY: ${{ secrets.ORACLE_SFTP_PRIVATE_KEY }}
          ORACLE_SFTP_KEY_PATH: ${{ secrets.ORACLE_SFTP_KEY_PATH }}
          ORACLE_SFTP_REMOTE_DIR: ${{ secrets.ORACLE_SFTP_REMOTE_DIR }}
        run: |
          python gshopping/export_reports.py
