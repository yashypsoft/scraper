name: Global Competitor Scraper

on:
  workflow_dispatch:
    inputs:
      competitor:
        description: "Select Competitor to Scrape"
        required: true
        type: choice
        options:
          - afa-stores
          - english-elm
          - walmart
          - cymax
          - homesquare
          - coleman-furniture
          - home-gallery-stores
          - bisonoffice
          - amazon-seller
          - emma-mason
          - overstock
          - furniture-cart
          - furniture-pick
          - grayson-living
          - unlimited-furniture-group
          - bed-bath-beyond
          - france-and-son
          - ashley
          - dining-rooms-outlet
          - bedroom-furniture-discounts
          - discount-living-rooms
          - tv-stands-outlet
          - wayfair
          - houzz
          - luxedecor
          - target
          - home-depot
          - sears
          - perigold
          - lowes
          - macys
          - raymour-flanigan
          - bush-furniture
          - jcpenney
          - grayson-luxury
          - bloomingdales
          - kathy-kuo-home
          - neiman-marcus
          - horchow
          - bushfurniture2go
          - quill
          - staples
          - oroa
          - us-mattress
          - beautyrest
          - groupon
          - serta
          - bellacor
          - homethreads
          - kohls
          - google-shopping
      total_sitemaps:
        description: "Total sitemaps to process (0 = auto-detect)"
        default: "0"
      sitemaps_per_job:
        description: "Sitemaps per parallel job"
        default: "2"
      urls_per_sitemap:
        description: "Max URLs per sitemap (0 = all)"
        default: "0"
      max_workers:
        description: "Parallel requests per job"
        default: "8"
      request_delay:
        description: "Delay between requests (seconds)"
        default: "1.0"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      site_name: ${{ steps.config.outputs.site_name }}
      scraper: ${{ steps.config.outputs.scraper }}
      url: ${{ steps.config.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Competitor Config
        id: config
        run: |
          COMPETITOR="${{ github.event.inputs.competitor }}"
          python -c "
          import json, sys
          with open('competitors.json') as f:
              data = json.load(f)
          comp = data.get('$COMPETITOR')
          if not comp or not comp.get('scraper'):
              print(f'::error::Scraper for $COMPETITOR not found or not configured in competitors.json.')
              sys.exit(1)
          print(f'scraper={comp[\"scraper\"]}')
          print(f'url={comp[\"url\"]}')
          print(f'site_name={comp[\"domain\"].replace(\".com\", \"\")}')
          " >> $GITHUB_OUTPUT

      - id: matrix
        run: |
          TOTAL=${{ github.event.inputs.total_sitemaps }}
          PER_JOB=${{ github.event.inputs.sitemaps_per_job }}
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "Using default total sitemaps: 10"
            TOTAL=10
          fi
          
          JOBS=$(( (TOTAL + PER_JOB - 1) / PER_JOB ))
          
          MATRIX_JSON="["
          for ((i=0; i<JOBS; i++)); do
            OFFSET=$(( i * PER_JOB ))
            MATRIX_JSON+="{\"offset\":$OFFSET,\"limit\":$PER_JOB},"
          done
          MATRIX_JSON="${MATRIX_JSON%,}]"
          
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  scrape:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3

      - name: Run Scraper
        env:
          CURR_URL: ${{ needs.plan.outputs.url }}
          SITEMAP_OFFSET: ${{ matrix.offset }}
          MAX_SITEMAPS: ${{ matrix.limit }}
          MAX_URLS_PER_SITEMAP: ${{ github.event.inputs.urls_per_sitemap }}
          MAX_WORKERS: ${{ github.event.inputs.max_workers }}
          REQUEST_DELAY: ${{ github.event.inputs.request_delay }}
        run: |
          echo "Running competitor: ${{ github.event.inputs.competitor }}"
          python ${{ needs.plan.outputs.scraper }}

      - name: Upload chunk
        uses: actions/upload-artifact@v4
        with:
          name: chunk_${{ matrix.offset }}
          path: |
            *chunk_*.csv
            *products_*.csv
          if-no-files-found: warn

  merge:
    needs: [plan, scrape]
    runs-on: ubuntu-latest
    steps:
      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          path: chunks
          pattern: chunk_*
          merge-multiple: true

      - name: Merge CSV chunks
        id: merge_csv
        run: |
          echo "Merging CSV chunks..."
          CSV_FILES=$(find chunks -name "*.csv" 2>/dev/null)
          if [ -z "$CSV_FILES" ]; then
            echo "ERROR: No CSV files found in artifacts!"
            exit 1
          fi
          
          FIRST_FILE=$(echo "$CSV_FILES" | head -n 1)
          head -n 1 "$FIRST_FILE" > products_full.csv
          
          for f in $CSV_FILES; do
            tail -n +2 "$f" 2>/dev/null | grep -v '^[[:space:]]*$' >> products_full.csv
          done
          
          FINAL_ROWS=$(tail -n +2 products_full.csv | grep -c '.' || echo "0")
          echo "final_rows=$FINAL_ROWS" >> $GITHUB_OUTPUT

      - name: Build output filename
        id: meta
        run: |
          SITE_NAME="${{ needs.plan.outputs.site_name }}"
          DATE=$(date +%F_%H%M%S)
          echo "name=${SITE_NAME}_${DATE}.csv" >> $GITHUB_OUTPUT

      - name: Upload to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_BASE_DIR: ${{ secrets.FTP_PATH }}
          FILE: ${{ steps.meta.outputs.name }}
        run: |
          if [ -z "$FTP_HOST" ]; then exit 0; fi
          sudo apt-get install -y lftp
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          cd $FTP_BASE_DIR
          put products_full.csv -o $FILE
          bye
          EOF

      - name: Archive final results
        uses: actions/upload-artifact@v4
        with:
          name: final_results
          path: products_full.csv
          retention-days: 7
